version: '3.8'

services:
  db:
    image: postgres:15
    environment:
      POSTGRES_DB: shopdb
      POSTGRES_USER: shopuser
      POSTGRES_PASSWORD: shoppass
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U shopuser"]
      interval: 5s
      timeout: 5s
      retries: 5

  admin:
    build: ./admin
    command: >
      sh -c "python manage.py migrate &&
             python manage.py runserver 0.0.0.0:8000"
    volumes:
      - ./admin:/app
    ports:
      - "8000:8000"
    env_file:
      - .env
    depends_on:
      db:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://shopuser:shoppass@db:5432/shopdb

  bot:
    build: ./bot
    command: python src/main.py
    volumes:
      - ./bot:/app
    env_file:
      - .env
    depends_on:
      db:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql+asyncpg://shopuser:shoppass@db:5432/shopdb

  webapp:
    build: ./webapp
    command: npm run dev
    volumes:
      - ./webapp:/app
      - /app/node_modules
    ports:
      - "5173:5173"
    environment:
      VITE_API_URL: http://admin:8000/api
    depends_on:
      - admin

volumes:
  postgres_data: